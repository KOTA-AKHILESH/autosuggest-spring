<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Card</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="navbar">
        <a href="#">Home 🏡</a>
        <a href="autosuggest.html" target="_blank">Autosuggest</a>
        <a href="https://github.com/" target="_blank">Github</a>
        <a href="https://leetcode.com/" target="_blank">Leetcode</a>
        <a href="codeforces-stats.html" target="_blank">Codeforces Stats</a>
        <a href="gitpulse.html" target="_blank">GitPulse</a>
        <a href="ask-gemini.html" target="_blank">Ask Gemini</a>
        <a href="leetcode-stats.html" target="_blank">Leetcode Stats</a>
        

        <button id="theme-btn" onclick="toggleTheme()">
            ☀️ White Mode
        </button>
    </div>

    <div class="card">
        <img id="user-image" src="john.png" alt="User Image">

        <h3 id="user-name">John Doe</h3>

        <p id="user-gender">Male ♂️</p>

        <p id="user-country">USA</p>

        <p id="user-age">Age: 30</p>

        <button onclick="toggle()">👤 Toggle User</button>

        <br><br>

        <button onclick="randomuser()">🎲 Random User</button>

        <br><br>

        <button onclick="previousRandomUser()">⬅️ Previous Random</button>

        <br><br>

        <button onclick="nextRandomUser()">➡️ Next Random</button>
    </div>

    <script src="index.js"></script>

</body>
</html>
